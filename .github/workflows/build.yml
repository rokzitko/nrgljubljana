name: build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_call:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CMAKE_C_COMPILER_LAUNCHER: ccache
  CMAKE_CXX_COMPILER_LAUNCHER: ccache
  CCACHE_COMPILERCHECK: content
  CCACHE_BASEDIR: ${{ github.workspace }}
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 500M
  CCACHE_SLOPPINESS: pch_defines,time_macros,include_file_mtime,include_file_ctime
  CCACHE_COMPRESS: "1"
  CCACHE_COMPRESSLEVEL: "1"

jobs:
  build:

    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: ubuntu-22.04, cc: gcc-12, cxx: g++-12, blas: openBLAS}
          - {os: ubuntu-22.04, cc: clang-15, cxx: clang++-15, blas: openBLAS}
          - {os: ubuntu-22.04, cc: gcc-12, cxx: g++-12, blas: imkl}
          - {os: ubuntu-22.04-arm, cc: gcc-12, cxx: g++-12, blas: openBLAS}
          - {os: ubuntu-22.04-arm, cc: clang-15, cxx: clang++-15, blas: openBLAS}
          - {os: ubuntu-24.04, cc: gcc-15, cxx: g++-15, blas: openBLAS}
          - {os: ubuntu-24.04, cc: clang-18, cxx: clang++-18, blas: openBLAS}
          - {os: ubuntu-24.04-arm, cc: gcc-15, cxx: g++-15, blas: openBLAS}
          - {os: ubuntu-24.04-arm, cc: clang-18, cxx: clang++-18, blas: openBLAS}
          - {os: macos-14, cc: clang, cxx: clang++, blas: accelerate}
          - {os: macos-15, cc: clang, cxx: clang++, blas: accelerate}
          - {os: macos-26, cc: clang, cxx: clang++, blas: accelerate, require_arm64: true}

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - uses: actions/cache/restore@v4
      with:
        path: ${{ env.CCACHE_DIR }}
        key: ccache-${{ matrix.os }}-${{ matrix.cc }}-${{ matrix.blas }}-${{ github.run_id }}
        restore-keys:
          ccache-${{ matrix.os }}-${{ matrix.cc }}-${{ matrix.blas }}-

    - name: Install ubuntu dependencies (openBLAS)
      if: ${{ startsWith(matrix.os, 'ubuntu-22.04') && contains(matrix.blas, 'openBLAS') }}
      run: >
        sudo apt-get update &&
        sudo apt-get install lsb-release wget software-properties-common &&
        wget -O /tmp/llvm.sh https://apt.llvm.org/llvm.sh && sudo chmod +x /tmp/llvm.sh && sudo /tmp/llvm.sh 15 &&
        sudo add-apt-repository ppa:mhier/libboost-latest && sudo apt update &&
        sudo apt-get install
        ccache
        clang-15
        g++-12
        hdf5-tools
        libblas-dev
        libclang-15-dev
        libc++-15-dev
        libc++abi-15-dev
        libomp-15-dev
        boost1.81
        libgmp-dev
        libgsl-dev
        libhdf5-dev
        liblapack-dev
        libopenmpi-dev
        openmpi-bin
        openmpi-common
        openmpi-doc
    
    - name: Install ubuntu dependencies (Intel MKL)
      if: ${{ (matrix.os == 'ubuntu-22.04') && contains(matrix.blas, 'imkl') }}
      run: >
        sudo apt-get update &&
        sudo apt-get install lsb-release wget software-properties-common &&
        wget -O /tmp/llvm.sh https://apt.llvm.org/llvm.sh && sudo chmod +x /tmp/llvm.sh && sudo /tmp/llvm.sh 15 &&
        sudo add-apt-repository ppa:mhier/libboost-latest && sudo apt update &&
        sudo apt-get install
        ccache
        clang-15
        g++-12
        hdf5-tools
        libmkl-dev
        libclang-15-dev
        libc++-15-dev
        libc++abi-15-dev
        boost1.81
        libgmp-dev
        libgsl-dev
        libhdf5-dev
        libopenmpi-dev
        openmpi-bin
        openmpi-common
        openmpi-doc

    - name: Install ubuntu 24.04 dependencies (openBLAS, GCC 15)
      if: ${{ startsWith(matrix.os, 'ubuntu-24.04') && (matrix.cc == 'gcc-15') && contains(matrix.blas, 'openBLAS') }}
      run: >
        sudo apt-get update &&
        sudo apt-get install software-properties-common &&
        sudo add-apt-repository ppa:ubuntu-toolchain-r/test && sudo apt-get update &&
        sudo apt-get install
        ccache
        gcc-15
        g++-15
        hdf5-tools
        libblas-dev
        libboost-dev
        libboost-mpi-dev
        libboost-serialization-dev
        libgmp-dev
        libgsl-dev
        libhdf5-dev
        liblapack-dev
        libopenmpi-dev
        openmpi-bin

    - name: Install ubuntu 24.04 dependencies (openBLAS, Clang 18)
      if: ${{ startsWith(matrix.os, 'ubuntu-24.04') && (matrix.cc == 'clang-18') && contains(matrix.blas, 'openBLAS') }}
      run: >
        sudo apt-get update &&
        sudo apt-get install
        ccache
        clang-18
        hdf5-tools
        libblas-dev
        libboost-dev
        libboost-mpi-dev
        libboost-serialization-dev
        libclang-18-dev
        libc++-18-dev
        libc++abi-18-dev
        libgmp-dev
        libgsl-dev
        libhdf5-dev
        liblapack-dev
        libomp-18-dev
        libopenmpi-dev
        openmpi-bin
    
    - name: Install homebrew dependencies (clang)
      if: ${{ contains(matrix.os, 'macos') && contains(matrix.cxx, 'clang') }}
      run: |
        brew install ccache llvm gcc boost boost-mpi hdf5 libomp open-mpi openblas gsl gmp

    - name: Assert Apple Silicon runner
      if: ${{ matrix.require_arm64 == true }}
      run: |
        test "$(uname -m)" = "arm64"

    - name: Add clang library path for ubuntu
      if: ${{ startsWith(matrix.os, 'ubuntu-22.04') && contains(matrix.cxx, 'clang') }}
      run: |
        echo "LIBRARY_PATH=/usr/lib/llvm-15/lib" >> $GITHUB_ENV

    - name: Add clang library path for ubuntu 24.04
      if: ${{ startsWith(matrix.os, 'ubuntu-24.04') && contains(matrix.cxx, 'clang') }}
      run: |
        echo "LIBRARY_PATH=/usr/lib/llvm-18/lib" >> $GITHUB_ENV

    - name: Add clang environment for macos
      if: ${{ contains(matrix.os, 'macos') && contains(matrix.cxx, 'clang') }}
      run: |
        LLVM_PREFIX="$(brew --prefix llvm)"
        GCC_PREFIX="$(brew --prefix gcc)"
        echo "CXXFLAGS=-stdlib=libc++" >> $GITHUB_ENV
        echo "PATH=$LLVM_PREFIX/bin:$GCC_PREFIX/bin:$PATH" >> $GITHUB_ENV

    - name: Build NRG Ljubljana
      env:
        CC: ${{ matrix.cc }}
        CXX: ${{ matrix.cxx }}
      run: |
        mkdir build && cd build && cmake .. -DCMAKE_INSTALL_PREFIX=$HOME/install
        make -j2 || make -j1 VERBOSE=1
    
    - name: Test NRG Ljubljana
      env:
        OPENBLAS_NUM_THREADS: "1"
      run: |
        cd build
        ctest -j2 --output-on-failure
    
    - name: ccache statistics
      if: always()
      run: ccache -sv

    - uses: actions/cache/save@v4
      if: always()
      with:
        path: ${{ env.CCACHE_DIR }}
        key: ccache-${{ matrix.os }}-${{ matrix.cc }}-${{ github.run_id }}

  sanitizers:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install sanitizer dependencies
      run: >
        sudo apt-get update &&
        sudo apt-get install lsb-release wget software-properties-common &&
        wget -O /tmp/llvm.sh https://apt.llvm.org/llvm.sh && sudo chmod +x /tmp/llvm.sh && sudo /tmp/llvm.sh 15 &&
        sudo add-apt-repository ppa:mhier/libboost-latest && sudo apt update &&
        sudo apt-get install
        ccache
        clang-15
        g++-12
        hdf5-tools
        libblas-dev
        libclang-15-dev
        libc++-15-dev
        libc++abi-15-dev
        libomp-15-dev
        boost1.81
        libgmp-dev
        libgsl-dev
        libhdf5-dev
        liblapack-dev
        libopenmpi-dev
        openmpi-bin
        openmpi-common
        openmpi-doc

    - name: Add clang library path for ubuntu
      run: |
        echo "LIBRARY_PATH=/usr/lib/llvm-15/lib" >> $GITHUB_ENV

    - name: Build with sanitizers
      env:
        CC: clang-15
        CXX: clang++-15
      run: |
        cmake -S . -B build -DCMAKE_INSTALL_PREFIX=$HOME/install -DASAN=ON -DUBSAN=ON -DCMAKE_BUILD_TYPE=Debug
        cmake --build build --parallel 2

    - name: Test with sanitizers
      env:
        OPENBLAS_NUM_THREADS: "1"
      run: |
        ctest --test-dir build -j2 --output-on-failure

  analysis:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install analysis dependencies
      run: >
        sudo apt-get update &&
        sudo apt-get install lsb-release wget software-properties-common &&
        wget -O /tmp/llvm.sh https://apt.llvm.org/llvm.sh && sudo chmod +x /tmp/llvm.sh && sudo /tmp/llvm.sh 15 &&
        sudo add-apt-repository ppa:mhier/libboost-latest && sudo apt update &&
        sudo apt-get install
        ccache
        clang-15
        clang-tidy-15
        cppcheck
        g++-12
        hdf5-tools
        libblas-dev
        libclang-15-dev
        libc++-15-dev
        libc++abi-15-dev
        libomp-15-dev
        boost1.81
        libgmp-dev
        libgsl-dev
        libhdf5-dev
        liblapack-dev
        libopenmpi-dev
        openmpi-bin
        openmpi-common
        openmpi-doc

    - name: Add LLVM tools to environment
      run: |
        echo "/usr/lib/llvm-15/bin" >> $GITHUB_PATH
        echo "LIBRARY_PATH=/usr/lib/llvm-15/lib" >> $GITHUB_ENV

    - name: Run static analysis build
      env:
        CC: clang-15
        CXX: clang++-15
      run: |
        cmake -S . -B build -DCMAKE_INSTALL_PREFIX=$HOME/install -DANALYZE_SOURCES=ON
        cmake --build build --target nrgljubljana_c --parallel 2

  docs:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install documentation dependencies
      run: >
        sudo apt-get update &&
        sudo apt-get install lsb-release wget software-properties-common &&
        sudo add-apt-repository ppa:mhier/libboost-latest && sudo apt update &&
        sudo apt-get install
        ccache
        g++-12
        hdf5-tools
        libblas-dev
        boost1.81
        libgmp-dev
        libgsl-dev
        libhdf5-dev
        liblapack-dev
        libopenmpi-dev
        openmpi-bin
        openmpi-common
        openmpi-doc
        python3-sphinx

    - name: Build documentation
      env:
        CC: gcc-12
        CXX: g++-12
      run: |
        cmake -S . -B build -DCMAKE_INSTALL_PREFIX=$HOME/install -DBuild_Documentation=ON -DSphinx_Only=ON
        cmake --build build --target docs_sphinx --parallel 2
