{% set name = "nrgljubljana" %}
{% set version = "2026.04" %}
{% set git_url = environ.get("NRGLJUBLJANA_CONDA_GIT_URL", "https://github.com/rokzitko/nrgljubljana.git") %}
{% set git_rev = environ.get("NRGLJUBLJANA_CONDA_GIT_REV", "master") %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  git_url: "{{ git_url }}"
  git_rev: "{{ git_rev }}"
  git_depth: 1

build:
  number: 9
  skip: true  # [win]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - cmake >=3.25
    - ninja
    - git
  host:
    - blas-devel =*=*mkl  # [target_platform == "linux-64"]
    - blas-devel =*=*openblas  # [target_platform != "linux-64"]
    - eigen >=3.4,<3.5
    - fmt 11.2.0
    - gmp
    - gsl
    - gtest 1.15.2
    - hdf5
    - highfive 3.1.0
    - libboost-devel
    - libboost-mpi
    - llvm-openmp  # [linux or osx]
    - openmpi  # [linux]
    - mpich  # [osx]
    - range-v3 0.12.*
  run:
    - gmp
    - gsl
    - hdf5
    - libboost
    - libboost-mpi
    - llvm-openmp  # [linux or osx]
    - mkl  # [target_platform == "linux-64"]
    - openmpi  # [linux]
    - mpich  # [osx]

test:
  commands:
    - test -x "${PREFIX}/bin/nrg"  # [unix]
    - test -x "${PREFIX}/bin/adapt"  # [unix]
    - test -z "$(ldd "${PREFIX}/bin/nrg" | grep 'not found')"  # [linux]
    - test -f "${PREFIX}/lib/libnrgljubljana_c.so"  # [linux]
    - test -f "${PREFIX}/lib/libnrgljubljana_c.dylib"  # [osx]
    - test -f "${PREFIX}/lib/cmake/nrgljubljana/nrgljubljana-config.cmake"  # [unix]
    - test -f "${PREFIX}/etc/conda/activate.d/nrgljubljana.sh"  # [unix]
    - test -f "${PREFIX}/etc/conda/deactivate.d/nrgljubljana.sh"  # [unix]
    - grep -q 'CONDA_PREFIX}/nrginit' "${PREFIX}/etc/conda/activate.d/nrgljubljana.sh"  # [unix]

about:
  home: https://github.com/rokzitko/nrgljubljana
  summary: Numerical renormalization group framework for quantum impurity problems
  description: |
    NRG Ljubljana is a framework for numerical renormalization group calculations
    for quantum impurity problems. This recipe builds the C++ runtime and the
    standalone tools from conda-packaged dependencies.

    The nrginit scripts are installed as part of the package. Using them
    requires Mathematica at runtime.
  license: GPL-3.0-or-later
  license_file: COPYING
  dev_url: https://github.com/rokzitko/nrgljubljana
  doc_url: http://auger.ijs.si/nrgljubljana/site/

extra:
  recipe-maintainers:
    - rokzitko
